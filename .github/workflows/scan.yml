name: Retail Radar — Daily Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Retail Radar
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: Commit updated product data
        run: |
          git config user.name "Retail Radar Bot"
          git config user.email "retail-radar[bot]@users.noreply.github.com"
          git add data/seen_products.json data/email_log.json || true
          git diff --staged --quiet || git commit -m "📡 Update seen products [$(date -u +%Y-%m-%d)]"
          git push
