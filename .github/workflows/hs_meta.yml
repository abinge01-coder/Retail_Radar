name: 🎮 Battlegrounds Meta Scan

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC daily
  push:
    branches: [main]
    paths:
      - 'hs_meta.py'        # re-scan when the scanner itself changes
  workflow_dispatch:
    inputs:
      force_insights:
        description: 'Force Claude insights generation (requires ANTHROPIC_API_KEY secret)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run meta scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python hs_meta.py

      - name: Commit updated meta data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hs_meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🎮 Update BG meta data [$(date -u +'%Y-%m-%d')]"
            git push
          fi
